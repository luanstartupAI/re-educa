<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercado de Produtos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
        }

        .nav-item {
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
        }

        .cart-icon {
            position: relative;
            background: #ff6b6b;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cart-icon:hover {
            transform: scale(1.1);
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        /* Products Grid */
        .products-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .category-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .filter-btn:hover, .filter-btn.active {
            border-color: #667eea;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #f0f0f0;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .product-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-digital {
            background: #4ecdc4;
            color: white;
        }

        .badge-physical {
            background: #ff6b6b;
            color: white;
        }

        .product-image {
            width: 100%;
            height: 160px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
        }

        .product-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            line-height: 1.4;
        }

        .product-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .product-price {
            font-size: 20px;
            font-weight: 700;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .old-price {
            font-size: 14px;
            color: #999;
            text-decoration: line-through;
            margin-left: 8px;
        }

        .add-to-cart {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-to-cart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        /* Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .sidebar-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            color: white;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Cart */
        .cart-items {
            max-height: 300px;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .item-price {
            color: #27ae60;
            font-weight: 600;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: #f0f0f0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            background: #e0e0e0;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }

        .total-price {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin: 15px 0;
            color: #333;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                order: -1;
            }
            
            .nav-menu {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        .empty-cart {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .empty-cart-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">SlimStore</div>
            <nav class="nav-menu">
                <div class="nav-item active" onclick="filterProducts('all')">Todos</div>
                <div class="nav-item" onclick="filterProducts('ebooks')">E-books</div>
                <div class="nav-item" onclick="filterProducts('supplements')">Suplementos</div>
                <div class="nav-item" onclick="filterProducts('equipment')">Equipamentos</div>
            </nav>
            <div class="cart-icon" onclick="toggleCart()">
                🛒
                <div class="cart-count" id="cartCount">0</div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Products Section -->
            <div class="products-section">
                <h2 class="section-title">Produtos para Emagrecimento</h2>
                
                <div class="category-filter">
                    <div class="filter-btn active" onclick="filterProducts('all')">Todos</div>
                    <div class="filter-btn" onclick="filterProducts('ebooks')">E-books</div>
                    <div class="filter-btn" onclick="filterProducts('supplements')">Suplementos</div>
                    <div class="filter-btn" onclick="filterProducts('equipment')">Equipamentos</div>
                    <div class="filter-btn" onclick="filterProducts('programs')">Programas</div>
                </div>

                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here -->
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <!-- Stats -->
                <div class="sidebar-card">
                    <h3 class="section-title">Estatísticas</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-value">248</div>
                            <div class="stat-label">Produtos</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">1.2k</div>
                            <div class="stat-label">Vendas</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">4.8★</div>
                            <div class="stat-label">Avaliação</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">98%</div>
                            <div class="stat-label">Satisfação</div>
                        </div>
                    </div>
                </div>

                <!-- Cart -->
                <div class="sidebar-card">
                    <h3 class="section-title">Carrinho de Compras</h3>
                    <div class="cart-items" id="cartItems">
                        <div class="empty-cart">
                            <div class="empty-cart-icon">🛒</div>
                            <p>Seu carrinho está vazio</p>
                        </div>
                    </div>
                    <div class="total-price" id="totalPrice" style="display: none;">Total: R$ 0,00</div>
                    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()" style="display: none;">
                        Finalizar Compra com Stripe
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample Products Data
        const products = [
            {
                id: 1,
                name: "E-book: Dieta Detox 21 Dias",
                description: "Guia completo para desintoxicar o corpo e perder peso em 21 dias",
                price: 29.90,
                oldPrice: 49.90,
                category: "ebooks",
                type: "digital",
                icon: "📚"
            },
            {
                id: 2,
                name: "Queimador de Gordura Natural",
                description: "Suplemento 100% natural para acelerar o metabolismo",
                price: 89.90,
                oldPrice: 119.90,
                category: "supplements",
                type: "physical",
                icon: "💊"
            },
            {
                id: 3,
                name: "E-book: Receitas Fit",
                description: "50 receitas saudáveis para emagrecer com sabor",
                price: 19.90,
                oldPrice: 39.90,
                category: "ebooks",
                type: "digital",
                icon: "👩‍🍳"
            },
            {
                id: 4,
                name: "Kit Emagrecimento Pro",
                description: "Combo completo: suplementos + e-book + plano alimentar",
                price: 199.90,
                oldPrice: 299.90,
                category: "programs",
                type: "combo",
                icon: "📦"
            },
            {
                id: 5,
                name: "Faixa Abdominal Térmica",
                description: "Acelera a queima de gordura na região abdominal",
                price: 59.90,
                oldPrice: 89.90,
                category: "equipment",
                type: "physical",
                icon: "🏋️"
            },
            {
                id: 6,
                name: "E-book: Jejum Intermitente",
                description: "Guia completo sobre jejum intermitente para iniciantes",
                price: 24.90,
                oldPrice: 44.90,
                category: "ebooks",
                type: "digital",
                icon: "⏰"
            },
            {
                id: 7,
                name: "Colageno Hidrolisado Premium",
                description: "Fortalece músculos e melhora a pele durante o emagrecimento",
                price: 79.90,
                oldPrice: 99.90,
                category: "supplements",
                type: "physical",
                icon: "✨"
            },
            {
                id: 8,
                name: "Programa VIP 90 Dias",
                description: "Acompanhamento completo com nutricionista e personal trainer",
                price: 497.90,
                oldPrice: 797.90,
                category: "programs",
                type: "service",
                icon: "👥"
            },
            {
                id: 9,
                name: "Balança Inteligente Bluetooth",
                description: "Monitora peso, IMC, gordura corporal e massa muscular",
                price: 129.90,
                oldPrice: 179.90,
                category: "equipment",
                type: "physical",
                icon: "⚖️"
            }
        ];

        let cart = [];
        let currentFilter = 'all';

        // Initialize the app
        function init() {
            renderProducts();
            updateCartDisplay();
        }

        // Render products
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const filteredProducts = currentFilter === 'all' 
                ? products 
                : products.filter(p => p.category === currentFilter);

            grid.innerHTML = filteredProducts.map(product => `
                <div class="product-card">
                    <div class="product-badge badge-${product.type === 'digital' ? 'digital' : 'physical'}">
                        ${product.type === 'digital' ? 'Digital' : product.type === 'physical' ? 'Físico' : 'Combo'}
                    </div>
                    <div class="product-image">${product.icon}</div>
                    <h3 class="product-title">${product.name}</h3>
                    <p class="product-description">${product.description}</p>
                    <div class="product-price">
                        R$ ${product.price.toFixed(2).replace('.', ',')}
                        ${product.oldPrice ? `<span class="old-price">R$ ${product.oldPrice.toFixed(2).replace('.', ',')}</span>` : ''}
                    </div>
                    <button class="add-to-cart" onclick="addToCart(${product.id})">
                        Adicionar ao Carrinho
                    </button>
                </div>
            `).join('');
        }

        // Filter products
        function filterProducts(category) {
            currentFilter = category;
            
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            renderProducts();
        }

        // Add to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCartDisplay();
            
            // Show animation feedback
            const button = event.target;
            const originalText = button.textContent;
            button.textContent = 'Adicionado!';
            button.style.background = '#27ae60';
            
            setTimeout(() => {
                button.textContent = originalText;
                button.style.background = '';
            }, 1000);
        }

        // Update cart display
        function updateCartDisplay() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const totalPrice = document.getElementById('totalPrice');
            const checkoutBtn = document.getElementById('checkoutBtn');

            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            cartCount.textContent = totalItems;

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="empty-cart">
                        <div class="empty-cart-icon">🛒</div>
                        <p>Seu carrinho está vazio</p>
                    </div>
                `;
                totalPrice.style.display = 'none';
                checkoutBtn.style.display = 'none';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="item-info">
                            <div class="item-name">${item.name}</div>
                            <div class="item-price">R$ ${item.price.toFixed(2).replace('.', ',')}</div>
                        </div>
                        <div class="quantity-controls">
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('');
                
                totalPrice.textContent = `Total: R$ ${total.toFixed(2).replace('.', ',')}`;
                totalPrice.style.display = 'block';
                checkoutBtn.style.display = 'block';
            }
        }

        // Update quantity
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    cart = cart.filter(item => item.id !== productId);
                }
                updateCartDisplay();
            }
        }

        // Checkout with Stripe (simulation)
        function checkout() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            
            // Here you would integrate with your Stripe API
            alert(`Redirecionando para pagamento Stripe...\nTotal: R$ ${total.toFixed(2).replace('.', ',')}\n\n(Integração com Stripe API seria implementada aqui)`);
            
            // Simulate successful payment
            setTimeout(() => {
                alert('Pagamento realizado com sucesso! 🎉');
                cart = [];
                updateCartDisplay();
            }, 2000);
        }

        // Toggle cart visibility (for mobile)
        function toggleCart() {
            // Implementation for mobile cart toggle
            console.log('Toggle cart');
        }

        // Initialize app when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
