<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - RE-EDUCA | Viva Saudável</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            padding: 2rem;
        }
        
        .auth-card {
            background: white;
            border-radius: var(--radius-2xl);
            padding: 3rem;
            box-shadow: var(--shadow-2xl);
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }
        
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-secondary) 100%);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }
        
        .auth-title {
            font-size: 1.75rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-gray-900);
            margin-bottom: 0.5rem;
        }
        
        .auth-subtitle {
            color: var(--color-gray-600);
            font-size: var(--font-size-sm);
        }
        
        .auth-form {
            margin-bottom: 2rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-700);
            margin-bottom: 0.5rem;
        }
        
        .form-input-group {
            position: relative;
        }
        
        .form-input, .form-select {
            width: 100%;
            padding: 0.75rem 1rem;
            padding-left: 3rem;
            border: 2px solid var(--color-gray-300);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            transition: all var(--transition-fast);
            background: white;
        }
        
        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(123, 160, 91, 0.1);
        }
        
        .form-input.error, .form-select.error {
            border-color: var(--color-error);
        }
        
        .form-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-gray-400);
            pointer-events: none;
        }
        
        .form-input:focus + .form-icon {
            color: var(--color-primary);
        }
        
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--color-gray-400);
            cursor: pointer;
            padding: 0;
        }
        
        .password-toggle:hover {
            color: var(--color-primary);
        }
        
        .form-error {
            color: var(--color-error);
            font-size: var(--font-size-sm);
            margin-top: 0.5rem;
            display: none;
        }
        
        .form-error.show {
            display: block;
        }
        
        .password-strength {
            margin-top: 0.5rem;
        }
        
        .strength-bar {
            height: 4px;
            background: var(--color-gray-200);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        
        .strength-fill {
            height: 100%;
            transition: all var(--transition-fast);
            border-radius: 2px;
        }
        
        .strength-text {
            font-size: var(--font-size-xs);
            color: var(--color-gray-600);
        }
        
        .terms-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        
        .terms-checkbox input[type="checkbox"] {
            width: 1.25rem;
            height: 1.25rem;
            accent-color: var(--color-primary);
            margin-top: 0.125rem;
        }
        
        .terms-text {
            font-size: var(--font-size-sm);
            color: var(--color-gray-600);
            line-height: var(--line-height-relaxed);
        }
        
        .terms-text a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
        }
        
        .terms-text a:hover {
            text-decoration: underline;
        }
        
        .auth-button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .auth-button:active {
            transform: translateY(0);
        }
        
        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }
        
        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--color-gray-300);
        }
        
        .auth-divider span {
            background: white;
            padding: 0 1rem;
            color: var(--color-gray-500);
            font-size: var(--font-size-sm);
        }
        
        .social-login {
            display: grid;
            gap: 1rem;
        }
        
        .social-button {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--color-gray-300);
            border-radius: var(--radius-lg);
            background: white;
            color: var(--color-gray-700);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        
        .social-button:hover {
            border-color: var(--color-primary);
            background: var(--color-gray-50);
        }
        
        .auth-footer {
            text-align: center;
            color: var(--color-gray-600);
            font-size: var(--font-size-sm);
        }
        
        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            color: white;
            font-weight: var(--font-weight-medium);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateX(100%);
            transition: transform var(--transition-fast);
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            background: var(--color-success);
        }
        
        .notification.error {
            background: var(--color-error);
        }
        
        .notification.info {
            background: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i data-lucide="user-plus"></i>
                </div>
                <h1 class="auth-title">Crie sua conta</h1>
                <p class="auth-subtitle">Junte-se à nossa comunidade e transforme sua vida com hábitos saudáveis</p>
            </div>

            <form id="register-form" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first-name" class="form-label">Nome</label>
                        <div class="form-input-group">
                            <input 
                                type="text" 
                                id="first-name" 
                                class="form-input" 
                                placeholder="Seu nome"
                                required
                            >
                            <i data-lucide="user" class="form-icon"></i>
                        </div>
                        <div class="form-error" id="first-name-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="last-name" class="form-label">Sobrenome</label>
                        <div class="form-input-group">
                            <input 
                                type="text" 
                                id="last-name" 
                                class="form-input" 
                                placeholder="Seu sobrenome"
                                required
                            >
                            <i data-lucide="user" class="form-icon"></i>
                        </div>
                        <div class="form-error" id="last-name-error"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <div class="form-input-group">
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="seu@email.com"
                            required
                        >
                        <i data-lucide="mail" class="form-icon"></i>
                    </div>
                    <div class="form-error" id="email-error"></div>
                </div>

                <div class="form-group">
                    <label for="phone" class="form-label">Telefone (opcional)</label>
                    <div class="form-input-group">
                        <input 
                            type="tel" 
                            id="phone" 
                            class="form-input" 
                            placeholder="(11) 99999-9999"
                        >
                        <i data-lucide="phone" class="form-icon"></i>
                    </div>
                    <div class="form-error" id="phone-error"></div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="birth-date" class="form-label">Data de Nascimento</label>
                        <div class="form-input-group">
                            <input 
                                type="date" 
                                id="birth-date" 
                                class="form-input"
                                required
                            >
                            <i data-lucide="calendar" class="form-icon"></i>
                        </div>
                        <div class="form-error" id="birth-date-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="gender" class="form-label">Gênero</label>
                        <div class="form-input-group">
                            <select id="gender" class="form-select" required>
                                <option value="">Selecione...</option>
                                <option value="male">Masculino</option>
                                <option value="female">Feminino</option>
                                <option value="other">Outro</option>
                            </select>
                            <i data-lucide="users" class="form-icon"></i>
                        </div>
                        <div class="form-error" id="gender-error"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <div class="form-input-group">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="Crie uma senha segura"
                            required
                        >
                        <i data-lucide="lock" class="form-icon"></i>
                        <button type="button" class="password-toggle" id="password-toggle">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div id="strength-fill" class="strength-fill"></div>
                        </div>
                        <div id="strength-text" class="strength-text">Digite uma senha</div>
                    </div>
                    <div class="form-error" id="password-error"></div>
                </div>

                <div class="form-group">
                    <label for="confirm-password" class="form-label">Confirmar Senha</label>
                    <div class="form-input-group">
                        <input 
                            type="password" 
                            id="confirm-password" 
                            class="form-input" 
                            placeholder="Confirme sua senha"
                            required
                        >
                        <i data-lucide="lock" class="form-icon"></i>
                        <button type="button" class="password-toggle" id="confirm-password-toggle">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <div class="form-error" id="confirm-password-error"></div>
                </div>

                <div class="terms-checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms" class="terms-text">
                        Eu concordo com os <a href="termos.html" target="_blank">Termos de Uso</a> 
                        e <a href="privacidade.html" target="_blank">Política de Privacidade</a>
                    </label>
                </div>

                <button type="submit" class="auth-button" id="register-button">
                    <span id="register-text">Criar Conta</span>
                    <div id="register-spinner" class="loading-spinner" style="display: none;"></div>
                </button>
            </form>

            <div class="auth-divider">
                <span>ou cadastre-se com</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-button" id="google-register">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Google</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://xegxcgwasjuszskgpjll.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZ3hjZ3dhc2p1c3pza2dwamxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgwMjk4MDMsImV4cCI6MjA2MzYwNTgwM30.2edkluCirLNyqyYdonJoE6BxnR_kLGLYMutfb28096U';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setupEventListeners();
            setupPhoneMask();
        });

        // Configurar event listeners
        function setupEventListeners() {
            // Formulário de cadastro
            document.getElementById('register-form').addEventListener('submit', handleRegister);
            
            // Toggle de senhas
            document.getElementById('password-toggle').addEventListener('click', () => togglePassword('password'));
            document.getElementById('confirm-password-toggle').addEventListener('click', () => togglePassword('confirm-password'));
            
            // Cadastro com Google
            document.getElementById('google-register').addEventListener('click', handleGoogleRegister);
            
            // Validação em tempo real
            document.getElementById('first-name').addEventListener('blur', validateFirstName);
            document.getElementById('last-name').addEventListener('blur', validateLastName);
            document.getElementById('email').addEventListener('blur', validateEmail);
            document.getElementById('phone').addEventListener('blur', validatePhone);
            document.getElementById('birth-date').addEventListener('blur', validateBirthDate);
            document.getElementById('gender').addEventListener('blur', validateGender);
            document.getElementById('password').addEventListener('input', validatePassword);
            document.getElementById('confirm-password').addEventListener('blur', validateConfirmPassword);
            document.getElementById('terms').addEventListener('change', validateTerms);
            
            // Limpar erros ao digitar
            document.querySelectorAll('.form-input, .form-select').forEach(input => {
                input.addEventListener('input', clearError);
            });
        }

        // Configurar máscara de telefone
        function setupPhoneMask() {
            const phoneInput = document.getElementById('phone');
            phoneInput.addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value.length <= 11) {
                    value = value.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
                    if (value.length < 14) {
                        value = value.replace(/(\d{2})(\d{4})(\d{4})/, '($1) $2-$3');
                    }
                }
                e.target.value = value;
            });
        }

        // Toggle de visibilidade da senha
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const toggleIcon = document.querySelector(`#${fieldId}-toggle i`);
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                toggleIcon.setAttribute('data-lucide', 'eye');
            }
            
            lucide.createIcons();
        }

        // Validações individuais
        function validateFirstName() {
            const firstName = document.getElementById('first-name').value.trim();
            const input = document.getElementById('first-name');
            const error = document.getElementById('first-name-error');
            
            if (!firstName) {
                showFieldError(input, error, 'Nome é obrigatório');
                return false;
            }
            
            if (firstName.length < 2) {
                showFieldError(input, error, 'Nome deve ter pelo menos 2 caracteres');
                return false;
            }
            
            clearFieldError(input, error);
            return true;
        }

        function validateLastName() {
            const lastName = document.getElementById('last-name').value.trim();
            const input = document.getElementById('last-name');
            const error = document.getElementById('last-name-error');
            
            if (!lastName) {
                showFieldError(input, error, 'Sobrenome é obrigatório');
                return false;
            }
            
            if (lastName.length < 2) {
                showFieldError(input, error, 'Sobrenome deve ter pelo menos 2 caracteres');
                return false;
            }
            
            clearFieldError(input, error);
            return true;
        }

        function validateEmail() {
            const email = document.getElementById('email').value.trim();
            const input = document.getElementById('email');
            const error = document.getElementById('email-error');
            
            if (!email) {
                showFieldError(input, error, 'E-mail é obrigatório');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showFieldError(input, error, 'E-mail inválido');
                return false;
            }
            
            clearFieldError(input, error);
            return true;
        }

        function validatePhone() {
            const phone = document.getElementById('phone').value.trim();
            const input = document.getElementById('phone');
            const error = document.getElementById('phone-error');
            
            if (phone && phone.replace(/\D/g, '').length < 10) {
                showFieldError(input, error, 'Telefone inválido');
                return false;
            }
            
            clearFieldError(input, error);
            return true;
        }

        function validateBirthDate() {
            const birthDate = document.getElementById('birth-date').value;
            const input = document.getElementById('birth-date');
            const error = document.getElementById('birth-date-error');
            
            if (!birthDate) {
                showFieldError(input, error, 'Data de nascimento é obrigatória');
                return false;
            }
            
            const today = new Date();
            const birth = new Date(birthDate);
            const age = today.getFullYear() - birth.getFullYear();
            
            if (age < 13) {
                showFieldError(input, error, 'Você deve ter pelo menos 13 anos');
                return false;
            }
            
            if (age > 120) {
                showFieldError(input, error, 'Data de nascimento inválida');
                return false;
            }
            
            clearFieldError(input, error);
            return true;
        }

        function validateGender() {
            const gender = document.getElementById('gender').value;
            const input = document.getElementById('gender');
            const error = document.getElementById('gender-error');
            
            if (!gender) {
                showFieldError(input, error, 'Gênero é obrigatório');
                return false;
            }
            
            clearFieldError(input, error);
            return true;
        }

        function validatePassword() {
            const password = document.getElementById('password').value;
            const input = document.getElementById('password');
            const error = document.getElementById('password-error');
            
            // Atualizar indicador de força
            updatePasswordStrength(password);
            
            if (!password) {
                showFieldError(input, error, 'Senha é obrigatória');
                return false;
            }
            
            if (password.length < 8) {
                showFieldError(input, error, 'Senha deve ter pelo menos 8 caracteres');
                return false;
            }
            
            const hasUpperCase = /[A-Z]/.test(password);
            const hasLowerCase = /[a-z]/.test(password);
            const hasNumbers = /\d/.test(password);
            const hasSpecialChar = /[!@#$%^&*(),.?":{}|<>]/.test(password);
            
            if (!hasUpperCase || !hasLowerCase || !hasNumbers) {
                showFieldError(input, error, 'Senha deve conter maiúsculas, minúsculas e números');
                return false;
            }
            
            clearFieldError(input, error);
            return true;
        }

        function validateConfirmPassword() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const input = document.getElementById('confirm-password');
            const error = document.getElementById('confirm-password-error');
            
            if (!confirmPassword) {
                showFieldError(input, error, 'Confirmação de senha é obrigatória');
                return false;
            }
            
            if (password !== confirmPassword) {
                showFieldError(input, error, 'Senhas não coincidem');
                return false;
            }
            
            clearFieldError(input, error);
            return true;
        }

        function validateTerms() {
            const terms = document.getElementById('terms').checked;
            const input = document.getElementById('terms');
            
            if (!terms) {
                showNotification('Você deve aceitar os termos de uso', 'error');
                return false;
            }
            
            return true;
        }

        // Atualizar indicador de força da senha
        function updatePasswordStrength(password) {
            const strengthFill = document.getElementById('strength-fill');
            const strengthText = document.getElementById('strength-text');
            
            let strength = 0;
            let strengthLabel = '';
            let strengthColor = '';
            
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) strength++;
            
            switch (strength) {
                case 0:
                case 1:
                    strengthLabel = 'Muito fraca';
                    strengthColor = '#EF4444';
                    break;
                case 2:
                    strengthLabel = 'Fraca';
                    strengthColor = '#F59E0B';
                    break;
                case 3:
                    strengthLabel = 'Média';
                    strengthColor = '#3B82F6';
                    break;
                case 4:
                    strengthLabel = 'Forte';
                    strengthColor = '#10B981';
                    break;
                case 5:
                    strengthLabel = 'Muito forte';
                    strengthColor = '#059669';
                    break;
            }
            
            strengthFill.style.width = `${(strength / 5) * 100}%`;
            strengthFill.style.backgroundColor = strengthColor;
            strengthText.textContent = strengthLabel;
            strengthText.style.color = strengthColor;
        }

        // Mostrar erro no campo
        function showFieldError(input, errorElement, message) {
            input.classList.add('error');
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        // Limpar erro do campo
        function clearFieldError(input, errorElement) {
            input.classList.remove('error');
            errorElement.classList.remove('show');
        }

        // Limpar erro ao digitar
        function clearError(e) {
            const input = e.target;
            const errorElement = document.getElementById(input.id + '-error');
            if (errorElement) {
                clearFieldError(input, errorElement);
            }
        }

        // Processar cadastro
        async function handleRegister(e) {
            e.preventDefault();
            
            // Validar todos os campos
            const validations = [
                validateFirstName(),
                validateLastName(),
                validateEmail(),
                validatePhone(),
                validateBirthDate(),
                validateGender(),
                validatePassword(),
                validateConfirmPassword(),
                validateTerms()
            ];
            
            if (!validations.every(v => v)) {
                return;
            }
            
            const formData = {
                firstName: document.getElementById('first-name').value.trim(),
                lastName: document.getElementById('last-name').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                birthDate: document.getElementById('birth-date').value,
                gender: document.getElementById('gender').value,
                password: document.getElementById('password').value
            };
            
            // Mostrar loading
            setLoading(true);
            
            try {
                // Criar usuário no Supabase Auth
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: formData.email,
                    password: formData.password,
                    options: {
                        data: {
                            full_name: `${formData.firstName} ${formData.lastName}`,
                            first_name: formData.firstName,
                            last_name: formData.lastName
                        }
                    }
                });
                
                if (authError) throw authError;
                
                // Criar perfil do usuário
                if (authData.user) {
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert([{
                            id: authData.user.id,
                            email: formData.email,
                            full_name: `${formData.firstName} ${formData.lastName}`,
                            phone: formData.phone || null,
                            birth_date: formData.birthDate,
                            gender: formData.gender
                        }]);
                    
                    if (profileError) {
                        console.error('Erro ao criar perfil:', profileError);
                    }
                    
                    // Registrar atividade de cadastro
                    await logUserActivity('register', {
                        method: 'email',
                        full_name: `${formData.firstName} ${formData.lastName}`
                    });
                }
                
                showNotification('Conta criada com sucesso! Verifique seu e-mail para confirmar.', 'success');
                
                // Redirecionar para página de confirmação
                setTimeout(() => {
                    window.location.href = 'confirmar-email.html?email=' + encodeURIComponent(formData.email);
                }, 2000);
                
            } catch (error) {
                console.error('Erro no cadastro:', error);
                
                let errorMessage = 'Erro ao criar conta. Tente novamente.';
                
                if (error.message.includes('User already registered')) {
                    errorMessage = 'Este e-mail já está cadastrado.';
                } else if (error.message.includes('Password should be at least')) {
                    errorMessage = 'Senha deve ter pelo menos 6 caracteres.';
                } else if (error.message.includes('Invalid email')) {
                    errorMessage = 'E-mail inválido.';
                }
                
                showNotification(errorMessage, 'error');
            } finally {
                setLoading(false);
            }
        }

        // Cadastro com Google
        async function handleGoogleRegister() {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                
                if (error) throw error;
                
            } catch (error) {
                console.error('Erro no cadastro com Google:', error);
                showNotification('Erro ao cadastrar com Google', 'error');
            }
        }

        // Registrar atividade do usuário
        async function logUserActivity(activityType, activityData = {}) {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    await supabase
                        .from('user_activities')
                        .insert([{
                            user_id: session.user.id,
                            activity_type: activityType,
                            activity_data: activityData,
                            ip_address: await getUserIP(),
                            user_agent: navigator.userAgent
                        }]);
                }
            } catch (error) {
                console.error('Erro ao registrar atividade:', error);
            }
        }

        // Obter IP do usuário
        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return null;
            }
        }

        // Controlar estado de loading
        function setLoading(loading) {
            const button = document.getElementById('register-button');
            const text = document.getElementById('register-text');
            const spinner = document.getElementById('register-spinner');
            
            if (loading) {
                button.disabled = true;
                text.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                button.disabled = false;
                text.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        // Mostrar notificação
        function showNotification(message, type = 'info') {
            // Remover notificação existente
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // Mostrar com animação
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);
            
            // Remover após 5 segundos
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 5000);
        }
    </script>
