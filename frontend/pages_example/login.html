<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RE-EDUCA | Viva Saudável</title>
    <link rel="stylesheet" href="src/styles/main.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            padding: 2rem;
        }
        
        .auth-card {
            background: white;
            border-radius: var(--radius-2xl);
            padding: 3rem;
            box-shadow: var(--shadow-2xl);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-secondary) 100%);
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }
        
        .auth-title {
            font-size: 1.75rem;
            font-weight: var(--font-weight-bold);
            color: var(--color-gray-900);
            margin-bottom: 0.5rem;
        }
        
        .auth-subtitle {
            color: var(--color-gray-600);
            font-size: var(--font-size-sm);
        }
        
        .auth-form {
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-weight: var(--font-weight-medium);
            color: var(--color-gray-700);
            margin-bottom: 0.5rem;
        }
        
        .form-input-group {
            position: relative;
        }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            padding-left: 3rem;
            border: 2px solid var(--color-gray-300);
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            transition: all var(--transition-fast);
            background: white;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(123, 160, 91, 0.1);
        }
        
        .form-input.error {
            border-color: var(--color-error);
        }
        
        .form-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--color-gray-400);
            pointer-events: none;
        }
        
        .form-input:focus + .form-icon {
            color: var(--color-primary);
        }
        
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--color-gray-400);
            cursor: pointer;
            padding: 0;
        }
        
        .password-toggle:hover {
            color: var(--color-primary);
        }
        
        .form-error {
            color: var(--color-error);
            font-size: var(--font-size-sm);
            margin-top: 0.5rem;
            display: none;
        }
        
        .form-error.show {
            display: block;
        }
        
        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .remember-me input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            accent-color: var(--color-primary);
        }
        
        .remember-me label {
            font-size: var(--font-size-sm);
            color: var(--color-gray-600);
            cursor: pointer;
        }
        
        .forgot-password {
            color: var(--color-primary);
            text-decoration: none;
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .auth-button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-semibold);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .auth-button:active {
            transform: translateY(0);
        }
        
        .auth-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }
        
        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--color-gray-300);
        }
        
        .auth-divider span {
            background: white;
            padding: 0 1rem;
            color: var(--color-gray-500);
            font-size: var(--font-size-sm);
        }
        
        .social-login {
            display: grid;
            gap: 1rem;
        }
        
        .social-button {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--color-gray-300);
            border-radius: var(--radius-lg);
            background: white;
            color: var(--color-gray-700);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        
        .social-button:hover {
            border-color: var(--color-primary);
            background: var(--color-gray-50);
        }
        
        .auth-footer {
            text-align: center;
            color: var(--color-gray-600);
            font-size: var(--font-size-sm);
        }
        
        .auth-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: var(--font-weight-medium);
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            color: white;
            font-weight: var(--font-weight-medium);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            transform: translateX(100%);
            transition: transform var(--transition-fast);
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            background: var(--color-success);
        }
        
        .notification.error {
            background: var(--color-error);
        }
        
        .notification.info {
            background: var(--color-primary);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <i data-lucide="heart"></i>
                </div>
                <h1 class="auth-title">Bem-vindo de volta!</h1>
                <p class="auth-subtitle">Entre na sua conta para continuar sua jornada saudável</p>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <div class="form-input-group">
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="seu@email.com"
                            required
                        >
                        <i data-lucide="mail" class="form-icon"></i>
                    </div>
                    <div class="form-error" id="email-error"></div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Senha</label>
                    <div class="form-input-group">
                        <input 
                            type="password" 
                            id="password" 
                            class="form-input" 
                            placeholder="Sua senha"
                            required
                        >
                        <i data-lucide="lock" class="form-icon"></i>
                        <button type="button" class="password-toggle" id="password-toggle">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <div class="form-error" id="password-error"></div>
                </div>

                <div class="auth-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Lembrar de mim</label>
                    </div>
                    <a href="recuperar-senha.html" class="forgot-password">Esqueci minha senha</a>
                </div>

                <button type="submit" class="auth-button" id="login-button">
                    <span id="login-text">Entrar</span>
                    <div id="login-spinner" class="loading-spinner" style="display: none;"></div>
                </button>
            </form>

            <div class="auth-divider">
                <span>ou continue com</span>
            </div>

            <div class="social-login">
                <button type="button" class="social-button" id="google-login">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>Google</span>
                </button>
            </div>

            <div class="auth-footer">
                <p>Não tem uma conta? <a href="cadastro.html">Criar conta gratuita</a></p>
            </div>
        </div>
    </div>

    <script>
        // Configuração do Supabase
        const SUPABASE_URL = 'https://xegxcgwasjuszskgpjll.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhlZ3hjZ3dhc2p1c3pza2dwamxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDgwMjk4MDMsImV4cCI6MjA2MzYwNTgwM30.2edkluCirLNyqyYdonJoE6BxnR_kLGLYMutfb28096U';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            setupEventListeners();
            checkExistingSession();
        });

        // Configurar event listeners
        function setupEventListeners() {
            // Formulário de login
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            
            // Toggle de senha
            document.getElementById('password-toggle').addEventListener('click', togglePassword);
            
            // Login com Google
            document.getElementById('google-login').addEventListener('click', handleGoogleLogin);
            
            // Validação em tempo real
            document.getElementById('email').addEventListener('blur', validateEmail);
            document.getElementById('password').addEventListener('blur', validatePassword);
            
            // Limpar erros ao digitar
            document.getElementById('email').addEventListener('input', clearError);
            document.getElementById('password').addEventListener('input', clearError);
        }

        // Verificar sessão existente
        async function checkExistingSession() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    // Usuário já está logado, redirecionar
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || 'dashboard.html';
                    window.location.href = redirect;
                }
            } catch (error) {
                console.error('Erro ao verificar sessão:', error);
            }
        }

        // Toggle de visibilidade da senha
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.querySelector('#password-toggle i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                toggleIcon.setAttribute('data-lucide', 'eye');
            }
            
            lucide.createIcons();
        }

        // Validar e-mail
        function validateEmail() {
            const email = document.getElementById('email').value;
            const emailInput = document.getElementById('email');
            const emailError = document.getElementById('email-error');
            
            if (!email) {
                showFieldError(emailInput, emailError, 'E-mail é obrigatório');
                return false;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showFieldError(emailInput, emailError, 'E-mail inválido');
                return false;
            }
            
            clearFieldError(emailInput, emailError);
            return true;
        }

        // Validar senha
        function validatePassword() {
            const password = document.getElementById('password').value;
            const passwordInput = document.getElementById('password');
            const passwordError = document.getElementById('password-error');
            
            if (!password) {
                showFieldError(passwordInput, passwordError, 'Senha é obrigatória');
                return false;
            }
            
            if (password.length < 6) {
                showFieldError(passwordInput, passwordError, 'Senha deve ter pelo menos 6 caracteres');
                return false;
            }
            
            clearFieldError(passwordInput, passwordError);
            return true;
        }

        // Mostrar erro no campo
        function showFieldError(input, errorElement, message) {
            input.classList.add('error');
            errorElement.textContent = message;
            errorElement.classList.add('show');
        }

        // Limpar erro do campo
        function clearFieldError(input, errorElement) {
            input.classList.remove('error');
            errorElement.classList.remove('show');
        }

        // Limpar erro ao digitar
        function clearError(e) {
            const input = e.target;
            const errorElement = document.getElementById(input.id + '-error');
            clearFieldError(input, errorElement);
        }

        // Processar login
        async function handleLogin(e) {
            e.preventDefault();
            
            // Validar campos
            const isEmailValid = validateEmail();
            const isPasswordValid = validatePassword();
            
            if (!isEmailValid || !isPasswordValid) {
                return;
            }
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // Mostrar loading
            setLoading(true);
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                
                // Salvar preferência de lembrar
                if (remember) {
                    localStorage.setItem('rememberLogin', 'true');
                } else {
                    localStorage.removeItem('rememberLogin');
                }
                
                // Registrar atividade de login
                await logUserActivity('login', {
                    method: 'email',
                    remember: remember
                });
                
                showNotification('Login realizado com sucesso!', 'success');
                
                // Redirecionar após um breve delay
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect') || 'dashboard.html';
                    window.location.href = redirect;
                }, 1000);
                
            } catch (error) {
                console.error('Erro no login:', error);
                
                let errorMessage = 'Erro ao fazer login. Tente novamente.';
                
                if (error.message.includes('Invalid login credentials')) {
                    errorMessage = 'E-mail ou senha incorretos.';
                } else if (error.message.includes('Email not confirmed')) {
                    errorMessage = 'Confirme seu e-mail antes de fazer login.';
                } else if (error.message.includes('Too many requests')) {
                    errorMessage = 'Muitas tentativas. Tente novamente em alguns minutos.';
                }
                
                showNotification(errorMessage, 'error');
            } finally {
                setLoading(false);
            }
        }

        // Login com Google
        async function handleGoogleLogin() {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                
                if (error) throw error;
                
            } catch (error) {
                console.error('Erro no login com Google:', error);
                showNotification('Erro ao fazer login com Google', 'error');
            }
        }

        // Registrar atividade do usuário
        async function logUserActivity(activityType, activityData = {}) {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    await supabase
                        .from('user_activities')
                        .insert([{
                            user_id: session.user.id,
                            activity_type: activityType,
                            activity_data: activityData,
                            ip_address: await getUserIP(),
                            user_agent: navigator.userAgent
                        }]);
                }
            } catch (error) {
                console.error('Erro ao registrar atividade:', error);
            }
        }

        // Obter IP do usuário
        async function getUserIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                return null;
            }
        }

        // Controlar estado de loading
        function setLoading(loading) {
            const button = document.getElementById('login-button');
            const text = document.getElementById('login-text');
            const spinner = document.getElementById('login-spinner');
            
            if (loading) {
                button.disabled = true;
                text.style.display = 'none';
                spinner.style.display = 'block';
            } else {
                button.disabled = false;
                text.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        // Mostrar notificação
        function showNotification(message, type = 'info') {
            // Remover notificação existente
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            // Mostrar com animação
            setTimeout(() => {
                notification.classList.add('show');
            }, 100);
            
            // Remover após 5 segundos
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    notification.remove();
                }, 300);
            }, 5000);
        }

        // Pré-preencher e-mail se lembrado
        window.addEventListener('load', () => {
            const rememberedEmail = localStorage.getItem('rememberedEmail');
            if (rememberedEmail) {
                document.getElementById('email').value = rememberedEmail;
                document.getElementById('remember').checked = true;
            }
        });
    </script>
</body>
</html>
